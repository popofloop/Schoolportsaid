workflows:
  android-workflow:
    name: Android Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract Project Files
        script: |
          unzip -o portsaidschol.zip
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Fix and Build Android APK
        script: |
          # إصلاح أي مشاكل في صيغة الملفات الناتجة عن الضغط من الويندوز
          sed -i '' 's/\r$//' gradlew || sed -i 's/\r$//' gradlew
          # إعطاء صلاحيات التشغيل الكاملة للملف
          chmod +x gradlew
          # تشغيل البناء المباشر
          ./gradlew assembleRelease
    artifacts:
      - app/build/outputs/apk/release/*.apk
