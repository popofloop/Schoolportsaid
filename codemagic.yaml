workflows:
  android-workflow:
    name: Android Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract Project Files
        script: |
          unzip portsaidschol.zip
      - name: Set up local.properties
        script: |
          cd School
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          cd School
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - School/app/build/outputs/apk/release/*.apk
