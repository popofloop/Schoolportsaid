workflows:
  android-workflow:
    name: Android Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract Project Files
        script: |
          unzip -o portsaidschol.zip
      - name: Generate Missing Gradle and Build
        script: |
          # البحث عن المجلد اللي جواه ملف build.gradle أو build.gradle.kts
          BUILD_FILE=$(find . -name "build.gradle*" -maxdepth 3 | head -n 1)
          
          if [ -z "$BUILD_FILE" ]; then
            echo "Error: Standard Android project files not found!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          # لو الملف جوة فولدر app، بنرجع خطوة لورا للمجلد الرئيسي للمشروع
          if [[ "$PROJECT_DIR" == */app ]]; then
            PROJECT_DIR=$(dirname "$PROJECT_DIR")
          fi
          
          cd "$PROJECT_DIR"
          
          # إنشاء ملف local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # توليد ملفات gradle وتشغيل البناء فوراً
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
