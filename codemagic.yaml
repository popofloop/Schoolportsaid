workflows:
  android-workflow:
    name: Android Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract Project Files
        script: |
          unzip -o portsaidschol.zip
      - name: Ultimate Build with Auto-Signing
        script: |
          BUILD_FILE=$(find . -name "build.gradle*" -maxdepth 3 | head -n 1)
          
          if [ -z "$BUILD_FILE" ]; then
            echo "Error: Standard Android project files not found!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$BUILD_FILE")
          if [[ "$PROJECT_DIR" == */app ]]; then
            PROJECT_DIR=$(dirname "$PROJECT_DIR")
          fi
          
          cd "$PROJECT_DIR"
          
          # إنشاء ملف local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # توليد ملفات Gradle بالإصدار المتوافق
          gradle wrapper --gradle-version 9.3.1
          
          # إنشاء مفتاح توقيع مؤقت وافتراضي جديد تماماً عشان الموبايل ما يعترضش عليه
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android || true
          
          # نقل المفتاح للمكان اللي الـ Gradle بيدور فيه أوتوماتيكياً
          mkdir -p ~/.android/
          cp debug.keystore ~/.android/debug.keystore || true
          
          # تشغيل البناء النهائي لنسخة الـ Debug الموقعة تلقائياً
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
