workflows:
  android-workflow:
    name: Android Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Extract Project Files
        script: |
          unzip -o portsaidschol.zip
      - name: Fix and Build Android APK
        script: |
          # البحث عن المجلد المكتشف الذي يحتوي على ملف gradlew
          GRADLEW_PATH=$(find . -name "gradlew" -maxdepth 3 | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found anywhere in the extracted files!"
            exit 1
          fi
          
          # الانتقال إلى المجلد الصحيح تلقائياً
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          cd "$PROJECT_DIR"
          
          # إنشاء ملف local.properties في المسار الصحيح
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # إصلاح علامات الويندوز وإعطاء الصلاحيات وتشغيل البناء
          sed -i '' 's/\r$//' gradlew || sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
